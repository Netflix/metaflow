[pytest]
timeout = 600
markers =
    basic: Basic flow tests (hello world, project decorator, etc.)
    config: Config decorator tests (Config, FlowMutator, etc.)
    conda: Tests requiring a conda environment manager
    scheduler_only: Tests requiring a remote scheduler (deployer mode only)
    dag: DAG structure tests (branch, foreach, nested foreach)
    slow: Tests that take a long time to run
    compliance: Orchestrator contract compliance tests (deployer mode only)
    triggers: Trigger and event-based flow tests (deployer mode only)
    lifecycle: Deployer lifecycle tests (deploy, status, undeploy)
    decorators: Decorator coverage tests (@environment, @card, etc.)
    sfn_compilation: Step Functions ASL compilation validation tests
    airflow_compilation: Airflow DAG compilation validation tests
    argo_compilation: Argo WorkflowTemplate compilation validation tests (no cluster needed)
