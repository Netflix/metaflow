[testenv:core-batch]
deps =
    -e {toxinidir}/../../[dev]
    -e {toxinidir}/../../test/extensions/packages/card_via_extinit
    -e {toxinidir}/../../test/extensions/packages/card_via_init
    -e {toxinidir}/../../test/extensions/packages/card_via_ns_subpackage
setenv =
    # Metaflow config
    METAFLOW_USER = tester
    METAFLOW_RUN_BOOL_PARAM = False
    METAFLOW_RUN_NO_DEFAULT_PARAM = test_str
    METAFLOW_DEFAULT_METADATA = service
    METAFLOW_SERVICE_URL = http://localhost:8080
    METAFLOW_DEFAULT_DATASTORE = s3
    METAFLOW_DATASTORE_SYSROOT_S3 = s3://metaflow-test/metaflow/{{nonce}}
    METAFLOW_BATCH_JOB_QUEUE = localbatch-default
    METAFLOW_BATCH_CLIENT_PARAMS = {{"endpoint_url":"http://localhost:8000"}}
    AWS_ACCESS_KEY_ID = rootuser
    AWS_SECRET_ACCESS_KEY = rootpass123
    AWS_ENDPOINT_URL_S3 = http://localhost:9000
    AWS_DEFAULT_REGION = us-east-1
    # Test-runner control
    METAFLOW_CORE_MARKER = batch
    METAFLOW_CORE_TOP_OPTIONS = --metadata=service --event-logger=nullSidecarLogger --no-pylint --quiet --with=batch --datastore=s3
    METAFLOW_CORE_CHECKS = python3-cli,python3-metadata
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLE_PARALLEL = 1
    METAFLOW_CORE_DISABLED_TESTS = LargeArtifactTest,WideForeachTest,TagCatchTest,BasicUnboundedForeachTest,NestedUnboundedForeachTest,DetectSegFaultTest,TimeoutDecoratorTest,CardExtensionsImportTest,RunIdFileTest
    PYTHONPATH = {toxinidir}
commands = pytest {toxinidir} -m batch -n 1 -v --tb=short --timeout=1800 {posargs}

