[tox]
skipsdist = True

# ---------------------------------------------------------------------------
# Base environment — deps and setenv vars shared by every core-* env.
# Each core-* env extends setenv with {[testenv]setenv}.
# ---------------------------------------------------------------------------

[testenv]
passenv = *
deps =
    -e {toxinidir}/../../[dev]
    -e {toxinidir}/../../test/extensions/packages/card_via_extinit
    -e {toxinidir}/../../test/extensions/packages/card_via_init
    -e {toxinidir}/../../test/extensions/packages/card_via_ns_subpackage
setenv =
    METAFLOW_USER = tester
    METAFLOW_RUN_BOOL_PARAM = False
    METAFLOW_RUN_NO_DEFAULT_PARAM = test_str
    PYTHONPATH = {toxinidir}

# ---------------------------------------------------------------------------
# Disabled-test lists — referenced via {[_disabled]key} substitution so
# each list is defined once and shared across envs that need it.
# ---------------------------------------------------------------------------

[_disabled]
local =
    LargeArtifact,S3Failure,CardComponentRefresh,CardWithRefresh
cloud =
    LargeArtifact,WideForeach,TagCatch,BasicUnboundedForeach,NestedUnboundedForeach,DetectSegFault,TimeoutDecorator,CardExtensionsImport,RunIdFile
# non-s3-cloud: like cloud but also disables S3Failure, which asserts that the
# S3 storage plugin emits TEST_S3_RETRY to stderr — an assertion that only
# holds against S3/MinIO, not Azure Blob or GCS. core-batch and core-k8s run
# against MinIO so they use {[_disabled]cloud} and keep S3Failure enabled.
non-s3-cloud =
    LargeArtifact,WideForeach,TagCatch,BasicUnboundedForeach,NestedUnboundedForeach,DetectSegFault,TimeoutDecorator,CardExtensionsImport,RunIdFile,S3Failure,CardComponentRefresh,CardWithRefresh
scheduler =
    LargeArtifact,WideForeach,TagCatch,BasicUnboundedForeach,NestedUnboundedForeach,DetectSegFault,TimeoutDecorator,CardExtensionsImport,RunIdFile,CardComponentRefresh,CardWithRefresh,S3Failure

# ---------------------------------------------------------------------------
# Core integration test environments — one per infrastructure backend.
#
# {toxinidir} here is test/core/, so repo root is {toxinidir}/../..
#
# Run a single backend:   tox -e core-local
# Run a specific test:    tox -e core-local -- --core-tests BasicArtifact
# Run a specific graph:   tox -e core-local -- --core-graphs single-linear-step
# Run in parallel:        tox -e core-local -- -n auto
# ---------------------------------------------------------------------------

[testenv:core-local]
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = local
    METAFLOW_CORE_MARKER = local
    METAFLOW_CORE_TOP_OPTIONS = --metadata=local --datastore=local --environment=local --event-logger=nullSidecarLogger --no-pylint --quiet
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]local}
commands = pytest {toxinidir} -m local {posargs}

[testenv:core-azure]
deps =
    -e {toxinidir}/../../[dev]
    -e {toxinidir}/../../test/extensions/packages/card_via_extinit
    -e {toxinidir}/../../test/extensions/packages/card_via_init
    -e {toxinidir}/../../test/extensions/packages/card_via_ns_subpackage
    azure-identity
    azure-storage-blob
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = local
    METAFLOW_DEFAULT_DATASTORE = azure
    METAFLOW_DATASTORE_SYSROOT_AZURE = metaflow-test/metaflow/{{nonce}}
    METAFLOW_AZURE_STORAGE_BLOB_SERVICE_ENDPOINT = http://127.0.0.1:10000/devstoreaccount1
    # AZURE_STORAGE_CONNECTION_STRING is intentionally NOT set here.
    # tox 4 parses setenv values for conditional markers and the semicolons in the
    # Azurite connection string trigger InvalidMarker. Set this env var in the
    # shell or in the CI workflow env: block instead.
    METAFLOW_CORE_MARKER = azure
    METAFLOW_CORE_TOP_OPTIONS = --metadata=local --datastore=azure --environment=local --event-logger=nullSidecarLogger --no-pylint --quiet
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]non-s3-cloud}
commands = pytest {toxinidir} -m azure -n 1 {posargs}

[testenv:core-gcs]
deps =
    -e {toxinidir}/../../[dev]
    -e {toxinidir}/../../test/extensions/packages/card_via_extinit
    -e {toxinidir}/../../test/extensions/packages/card_via_init
    -e {toxinidir}/../../test/extensions/packages/card_via_ns_subpackage
    google-cloud-storage
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = local
    METAFLOW_DEFAULT_DATASTORE = gs
    METAFLOW_DATASTORE_SYSROOT_GS = gs://metaflow-test/metaflow/{{nonce}}
    STORAGE_EMULATOR_HOST = http://localhost:4443
    METAFLOW_CORE_MARKER = gcs
    METAFLOW_CORE_TOP_OPTIONS = --metadata=local --datastore=gs --environment=local --event-logger=nullSidecarLogger --no-pylint --quiet
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]non-s3-cloud}
commands = pytest {toxinidir} -m gcs -n 1 {posargs}

[testenv:core-batch]
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = service
    METAFLOW_SERVICE_URL = http://localhost:8080
    METAFLOW_DEFAULT_DATASTORE = s3
    METAFLOW_DATASTORE_SYSROOT_S3 = s3://metaflow-test/metaflow/{{nonce}}
    METAFLOW_BATCH_JOB_QUEUE = localbatch-default
    METAFLOW_ECS_S3_ACCESS_IAM_ROLE = arn:aws:iam::123456789012:role/ecs-s3-access-role
    METAFLOW_SERVICE_VERSION_CHECK = 0
    AWS_ACCESS_KEY_ID = rootuser
    AWS_SECRET_ACCESS_KEY = rootpass123
    AWS_ENDPOINT_URL_S3 = http://localhost:9000
    AWS_ENDPOINT_URL_BATCH = http://localhost:8000
    AWS_DEFAULT_REGION = us-east-1
    METAFLOW_CORE_MARKER = batch
    METAFLOW_CORE_TOP_OPTIONS = --metadata=service --event-logger=nullSidecarLogger --no-pylint --quiet --with=batch --datastore=s3
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLE_PARALLEL = 1
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]cloud}
commands = pytest {toxinidir} -m batch -n 1 {posargs}

[testenv:core-k8s]
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = service
    METAFLOW_SERVICE_URL = http://localhost:8080
    METAFLOW_SERVICE_INTERNAL_URL = http://metaflow-service.default.svc.cluster.local:8080
    METAFLOW_DEFAULT_DATASTORE = s3
    METAFLOW_DATASTORE_SYSROOT_S3 = s3://metaflow-test/metaflow/{{nonce}}
    METAFLOW_KUBERNETES_NAMESPACE = default
    METAFLOW_KUBERNETES_SECRETS = minio-secret
    METAFLOW_SERVICE_VERSION_CHECK = 0
    AWS_ACCESS_KEY_ID = rootuser
    AWS_SECRET_ACCESS_KEY = rootpass123
    AWS_ENDPOINT_URL_S3 = http://localhost:9000
    AWS_DEFAULT_REGION = us-east-1
    METAFLOW_CORE_MARKER = k8s
    METAFLOW_CORE_TOP_OPTIONS = --metadata=service --event-logger=nullSidecarLogger --no-pylint --quiet --with=kubernetes:memory=256,disk=1024 --datastore=s3
    METAFLOW_CORE_EXECUTORS = cli,api
    METAFLOW_CORE_DISABLE_PARALLEL = 1
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]cloud}
commands = pytest {toxinidir} -m k8s -n 1 {posargs}

[testenv:core-argo]
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = service
    METAFLOW_SERVICE_URL = http://localhost:8080
    METAFLOW_SERVICE_INTERNAL_URL = http://metaflow-service.default.svc.cluster.local:8080
    METAFLOW_DEFAULT_DATASTORE = s3
    METAFLOW_DATASTORE_SYSROOT_S3 = s3://metaflow-test/metaflow/{{nonce}}
    METAFLOW_KUBERNETES_NAMESPACE = default
    METAFLOW_KUBERNETES_SECRETS = minio-secret
    METAFLOW_SERVICE_VERSION_CHECK = 0
    AWS_ACCESS_KEY_ID = rootuser
    AWS_SECRET_ACCESS_KEY = rootpass123
    AWS_ENDPOINT_URL_S3 = http://localhost:9000
    AWS_DEFAULT_REGION = us-east-1
    METAFLOW_CORE_MARKER = argo
    METAFLOW_CORE_TOP_OPTIONS = --metadata=service --event-logger=nullSidecarLogger --no-pylint --quiet --datastore=s3
    METAFLOW_CORE_EXECUTORS = scheduler
    METAFLOW_CORE_DISABLE_PARALLEL = 1
    METAFLOW_CORE_SCHEDULER = argo-workflows
    METAFLOW_CORE_SCHEDULER_TIMEOUT = 600
    METAFLOW_CORE_DISABLED_TESTS = {[_disabled]scheduler}
commands = pytest {toxinidir} -m argo -n 1 {posargs}

[testenv:core-sfn]
setenv =
    {[testenv]setenv}
    METAFLOW_DEFAULT_METADATA = service
    METAFLOW_SERVICE_URL = http://localhost:8080
    METAFLOW_DEFAULT_DATASTORE = s3
    METAFLOW_DATASTORE_SYSROOT_S3 = s3://metaflow-test/metaflow/{{nonce}}
    METAFLOW_BATCH_JOB_QUEUE = localbatch-default
    METAFLOW_SFN_DYNAMO_DB_TABLE = metaflow-sfn
    METAFLOW_SFN_IAM_ROLE = arn:aws:iam::123456789012:role/sfn-local-role
    METAFLOW_EVENTS_SFN_ACCESS_IAM_ROLE = arn:aws:iam::123456789012:role/events-sfn-role
    METAFLOW_ECS_S3_ACCESS_IAM_ROLE = arn:aws:iam::123456789012:role/ecs-s3-access-role
    METAFLOW_SERVICE_VERSION_CHECK = 0
    AWS_ACCESS_KEY_ID = rootuser
    AWS_SECRET_ACCESS_KEY = rootpass123
    AWS_ENDPOINT_URL_S3 = http://localhost:9000
    AWS_ENDPOINT_URL_SFN = http://localhost:8082
    AWS_ENDPOINT_URL_BATCH = http://localhost:8000
    AWS_ENDPOINT_URL_DYNAMODB = http://localhost:8765
    AWS_ENDPOINT_URL_EVENTBRIDGE = http://localhost:7777
    AWS_DEFAULT_REGION = us-east-1
