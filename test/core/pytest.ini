[pytest]
# tests/ contains real pytest modules in this rewrite; leave it discoverable.
# Other dirs are framework or fixtures, not tests.
norecursedirs = metaflow_extensions metaflow_test __pycache__ .tox

# Default timeout, verbosity and failure formatting for all core test runs.
# Centralised here so tox commands only carry what differs per env.
timeout = 1800
addopts = -v --tb=short

markers =
    local: local datastore/metadata context
    azure: Azure blob storage context
    gcs: Google Cloud Storage context
    batch: AWS Batch context
    k8s: Kubernetes context
    argo: Argo Workflows context
    sfn: AWS Step Functions context
