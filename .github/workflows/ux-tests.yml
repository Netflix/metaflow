name: UX Tests

# Runs the cross-backend UX test suite (local, argo-workflows, airflow) using
# the devstack defined in devtools/. Each backend runs in a separate parallel
# job; pytest-xdist parallelizes individual tests within each job.
#
# Coverage is collected from each backend job, then combined in a final job
# and posted as a workflow summary + downloadable HTML report.
#
# sfn-batch is omitted until localbatch is published to PyPI. To enable it,
# add a matrix entry:
#   - backend: sfn-batch
#     services: "minio,postgresql,metadata-service,localbatch,ddb-local,sfn-local"
# and add `pip install localbatch` to the install step.

on:
  push:
    branches:
      - master
      - "npow/**"  # run on this dev branch during development
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  ux-tests:
    name: "${{ matrix.backend }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: local
            services: "minio,postgresql,metadata-service"
          - backend: argo-kubernetes
            services: "minio,postgresql,metadata-service,argo-workflows"
          - backend: airflow-kubernetes
            services: "minio,postgresql,metadata-service,airflow"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Metaflow and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" pytest-xdist pytest-timeout pytest-cov

      - name: Set up minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          cpus: 2
          memory: 6144

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Tilt
        run: |
          # Pin to the same version as devtools/Makefile to avoid extension API breaks
          curl -fsSL https://raw.githubusercontent.com/tilt-dev/tilt/master/scripts/install.sh \
            | VERSION=v0.33.11 bash

      - name: Start devstack
        working-directory: devtools
        run: |
          # The Tiltfile writes config files into .devtools/ — create it first.
          # (make up does this, but we run tilt directly in CI.)
          mkdir -p .devtools

          # --stream replaces the TUI with plain log output, suitable for CI.
          # Tilt detects a headless env and won't try to open a browser.
          SERVICES="${{ matrix.services }}" \
            tilt up --stream 2>&1 | tee /tmp/tilt.log &

          # Wait for Tilt API server (takes a few seconds to bind after launch).
          echo "Waiting for Tilt API server..."
          for i in $(seq 1 60); do
            tilt get session >/dev/null 2>&1 && break
            sleep 2
          done

          # Wait for the Tiltfile itself to finish loading (helm pulls happen here).
          # The (Tiltfile) uiresource is created as soon as tilt begins parsing;
          # waiting for Ready means all local() calls in the Tiltfile completed.
          echo "Waiting for Tiltfile to load..."
          tilt wait --for=condition=Ready "uiresource/(Tiltfile)" --timeout=120s

          echo "Waiting for all devstack services (generate-configs)..."
          tilt wait --for=condition=Ready uiresource/generate-configs --timeout=1800s

      - name: Wait for test image to be loaded into minikube
        if: matrix.backend != 'local'
        run: |
          tilt wait --for=condition=Ready uiresource/build-test-image --timeout=300s

      - name: Start minikube tunnel
        run: |
          sudo minikube tunnel &
          # Give the tunnel a moment to establish routes
          sleep 5

      - name: Wait for Airflow REST API
        if: matrix.backend == 'airflow-kubernetes'
        run: |
          # The webserver startup probe passes on /health before gunicorn workers
          # are fully ready to serve API requests.  Poll the actual REST API
          # endpoint (with auth) until it returns 200 or we time out.
          echo "Waiting for Airflow REST API at http://localhost:8090/api/v1/health ..."
          for i in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -u admin:admin http://localhost:8090/api/v1/health 2>/dev/null || echo "000")
            echo "  attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Airflow REST API is ready."
              break
            fi
            sleep 10
          done
          if [ "$status" != "200" ]; then
            echo "Airflow REST API did not become ready in time (last status: $status)"
            exit 1
          fi

      - name: Run UX tests — ${{ matrix.backend }}
        run: |
          AWS_SHARED_CREDENTIALS_FILE="" \
          PYTHONPATH=$PWD \
          python -m pytest \
            test/ux/core/test_basic.py test/ux/core/test_config.py \
            -m "not conda" \
            --only-backend "${{ matrix.backend }}" \
            -n 6 \
            -v \
            --tb=short \
            --timeout=900 \
            --cov=metaflow \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-branch \
            --junit-xml=junit-${{ matrix.backend }}.xml

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.backend }}
          path: |
            .coverage
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.backend }}
          path: junit-${{ matrix.backend }}.xml
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — ${{ matrix.backend }}"
          path: junit-${{ matrix.backend }}.xml
          reporter: java-junit
          fail-on-error: false

      - name: Dump Airflow diagnostics on failure
        if: failure() && matrix.backend == 'airflow-kubernetes'
        run: |
          echo "=== Scheduler pod DAGs directory ==="
          kubectl exec -n default airflow-scheduler-0 -- ls -la /opt/airflow/dags/ 2>&1 || true
          echo "=== Airflow scheduler config: dag_dir_list_interval ==="
          kubectl exec -n default airflow-scheduler-0 -- \
            airflow config get-value scheduler dag_dir_list_interval 2>&1 || true
          echo "=== Airflow import errors (via API) ==="
          curl -s -u admin:admin http://localhost:8090/api/v1/importErrors 2>&1 || true
          echo "=== DagFileProcessorManager log (last 50 lines) ==="
          kubectl exec -n default airflow-scheduler-0 -- \
            tail -50 /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log 2>&1 || true

      - name: Show Tilt logs on failure
        if: failure()
        run: cat /tmp/tilt.log | tail -200 || true

      - name: Upload Tilt logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tilt-logs-${{ matrix.backend }}
          path: /tmp/tilt.log
          if-no-files-found: ignore

  coverage-report:
    name: "Coverage Report"
    needs: ux-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download coverage data from all backends
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts/

      - name: Download test results from all backends
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test results
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Combine coverage data
        run: |
          # Each backend job drops a .coverage file; rename them so coverage
          # combine can pick them all up from the current directory.
          for dir in coverage-artifacts/coverage-*/; do
            backend=$(basename "$dir" | sed 's/^coverage-//')
            src="$dir/.coverage"
            if [ -f "$src" ]; then
              cp "$src" ".coverage.$backend"
              echo "Copied $src → .coverage.$backend"
            fi
          done
          coverage combine
          echo "Combined data sources:"
          coverage debug data

      - name: Generate combined HTML report
        run: |
          coverage html -d combined-htmlcov/ --title="Metaflow UX Test Coverage"
          coverage xml -o combined-coverage.xml

      - name: Post coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report --sort=miss >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(coverage report | tail -1 | awk '{print $NF}')
          echo "**Total coverage: $total**" >> $GITHUB_STEP_SUMMARY

      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: |
            combined-htmlcov/
            combined-coverage.xml
