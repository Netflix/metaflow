[tox]
envlist = unit
skipsdist = True

[testenv]
passenv = *
deps =
    -e {toxinidir}[dev]

[testenv:unit]
commands = pytest test/unit/ test/cmd/ test/plugins/ --ignore=test/unit/spin -m "not docker" -v --tb=short --timeout=120 {posargs}

# ---------------------------------------------------------------------------
# Core integration test environments — one per infrastructure backend.
# Each env sets METAFLOW_CORE_CONTEXT so conftest.py only collects items for
# that backend (fast collection), then applies the matching -m marker filter.
#
# Run a single backend:   tox -e core-local
# Run a specific test:    tox -e core-local -- --core-tests BasicArtifactTest
# Run a specific graph:   tox -e core-local -- --core-graphs single-linear-step
# Run in parallel:        tox -e core-local -- -n auto
# ---------------------------------------------------------------------------

[testenv:core-local]
deps =
    -e {toxinidir}[dev]
    -e {toxinidir}/test/extensions/packages/card_via_extinit
    -e {toxinidir}/test/extensions/packages/card_via_init
    -e {toxinidir}/test/extensions/packages/card_via_ns_subpackage
setenv =
    METAFLOW_CORE_CONTEXT = python3-all-local
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m local -v --tb=short --timeout=1800 {posargs}

[testenv:core-azure]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-all-local-azure-storage
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m azure -n 1 -v --tb=short --timeout=1800 {posargs}

[testenv:core-gcs]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-all-local-gcs
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m gcs -n 1 -v --tb=short --timeout=1800 {posargs}

[testenv:core-batch]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-batch
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m batch -n 1 -v --tb=short --timeout=1800 {posargs}

[testenv:core-k8s]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-k8s
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m k8s -n 1 -v --tb=short --timeout=1800 {posargs}

[testenv:core-argo]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-argo-workflows
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m argo -n 1 -v --tb=short --timeout=1800 {posargs}

[testenv:core-sfn]
deps =
    -e {toxinidir}[dev]
setenv =
    METAFLOW_CORE_CONTEXT = python3-sfn
    PYTHONPATH = {toxinidir}/test/core
commands = pytest test/core/ -m sfn -n 1 -v --tb=short --timeout=1800 {posargs}

# ---------------------------------------------------------------------------
# UX / orchestration tests
# ---------------------------------------------------------------------------

[testenv:ux-local]
commands = pytest test/ux/core/ --only-backend local -n 4 -v --tb=short --timeout=1800 {posargs}

[testenv:ux-sfn]
commands = pytest test/ux/core/ --only-backend sfn-batch -n 4 -v --tb=short --timeout=1800 {posargs}

[testenv:ux-argo]
commands = pytest test/ux/core/ --only-backend argo-kubernetes -n 2 -v --tb=short --timeout=1800 {posargs}

[testenv:ux-airflow]
commands = pytest test/ux/core/ --only-backend airflow-kubernetes -n 2 -v --tb=short --timeout=1800 {posargs}
