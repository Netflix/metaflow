apiVersion: v1
kind: Service
metadata:
  name: argo-events-webhook-eventsource-svc-tilt
  namespace: default
spec:
  ports:
    - port: 12000
      protocol: TCP
      targetPort: 12000
  selector:
    controller: eventsource-controller
    eventsource-name: argo-events-webhook
    owner-name: argo-events-webhook
  type: ClusterIP
