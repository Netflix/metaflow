apiVersion: batch/v1
kind: Job
metadata:
  name: ddb-table-init
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              if aws dynamodb describe-table \
                   --endpoint-url http://ddb-local:8000 \
                   --region us-east-1 \
                   --table-name metaflow-sfn 2>/dev/null; then
                echo "Table already exists, skipping creation"
              else
                aws dynamodb create-table \
                  --endpoint-url http://ddb-local:8000 \
                  --region us-east-1 \
                  --table-name metaflow-sfn \
                  --attribute-definitions AttributeName=pathspec,AttributeType=S \
                  --key-schema AttributeName=pathspec,KeyType=HASH \
                  --billing-mode PAY_PER_REQUEST
              fi
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
