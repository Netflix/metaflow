apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jobset-full-access
rules:
  - apiGroups: [jobset.x-k8s.io]
    resources: [jobsets]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: default-jobset-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  kind: ClusterRole
  name: jobset-full-access
  apiGroup: rbac.authorization.k8s.io
